site_name: sabia
site_description: Polars-native technical features for trading pipelines — pure, point-in-time, online-ready
site_url: https://aexsalomao.github.io/sabia
repo_url: https://github.com/aexsalomao/sabia
repo_name: aexsalomao/sabia
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.action.edit
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aexsalomao/sabia
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/sabia/
      name: PyPI

copyright: Copyright &copy; 2026 Antônio Salomão

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Feature catalog: catalog.md
  - API Reference: api.md
  - Contributing: contributing.md
  - Changelog: changelog.md
